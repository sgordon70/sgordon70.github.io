<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DropQuest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, sans-serif;
            text-align: center;
            padding: 60px 20px;
            background: #111;
            color: #eee;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p { color: #ccc; max-width: 420px; margin: 14px auto; line-height: 1.5; }
        a.button {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 28px;
            background: #FF6F59;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 20px;
            border: 3px solid white;
        }
        .note {
            margin-top: 32px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🎯 Someone sent you a quest!</h1>
    <p>A friend made you a real-world scavenger hunt with DropQuest. Get the free app to play it.</p>
    <a class="button" href="https://apps.apple.com/app/id6789737494">Get DropQuest</a>
    <p class="note">Already have DropQuest installed? Go back and tap the link again — it should open directly.</p>
</body>
</html>
